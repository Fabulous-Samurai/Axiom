name: SonarCloud Analysis

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    
    env:
      BUILD_WRAPPER_OUT_DIR: build-wrapper-output

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build lcov python3-dev
          python3 -m pip install nanobind

      - name: Install SonarCloud Tools
        uses: SonarSource/sonarcloud-github-c-cpp@v2

      - name: Configure CMake (Coverage)
        run: |
          cmake -B build-coverage \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage -O0 -g" \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage -O0 -g" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DAXIOM_ENABLE_TELEMETRY=ON

      - name: Build with build-wrapper
        run: |
          build-wrapper-linux-x86-64 \
            --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} \
            cmake --build build-coverage -j$(nproc)

      - name: Run tests
        run: |
          cd build-coverage
          ctest --output-on-failure -j$(nproc)
          cd ..

      - name: Generate LCOV coverage report
        run: |
          # Capture coverage
          lcov --capture \
               --directory build-coverage \
               --output-file coverage-raw.info \
               --ignore-errors mismatch

          # Filter out system and third-party files
          lcov --remove coverage-raw.info \
               '/usr/*' \
               '*/_deps/*' \
               '*/tests/*' \
               '*/extern/*' \
               --output-file coverage-filtered.info \
               --ignore-errors unused

          # Summary for logs
          lcov --list coverage-filtered.info

      - name: Run SonarCloud scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            --define sonar.cfamily.build-wrapper-output="${{ env.BUILD_WRAPPER_OUT_DIR }}" \
            --define sonar.coverageReportPaths=coverage-filtered.info \
            --define sonar.cfamily.gcov.reportsPath=build-coverage \
            --define sonar.cfamily.threads=$(nproc)
