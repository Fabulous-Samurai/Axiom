# Optimized AXIOM Engine CI/CD Workflow

name: AXIOM Engine CI/CD

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]
  release:
    types: [ created ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build-type: [Release, Debug]

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@83691586b907e55127df0f19323e969444938424 # v1.14
      with:
        cmake-version: '3.25.x'

    - name: Setup Ninja
      uses: seanmiddleditch/gha-setup-ninja@7e868db193083521279238953814bb54073c55bf # master

    - name: Install dependencies
      run: |
        if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
          sudo apt-get update && sudo apt-get install -y build-essential g++ python3 python3-dev libnuma-dev;
        elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
          brew install python@3.11;
        else
          echo "Windows dependencies are pre-installed via MSYS2.";
        fi

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}

    - name: Build
      run: cmake --build build --config ${{ matrix.build-type }}

    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure --build-config ${{ matrix.build-type }}

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@604373da0ea81b20e9c956fa3dd21a7c21c56ad # v4.4.1
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.build-type }}
        path: build/Testing/
        if-no-files-found: ignore
