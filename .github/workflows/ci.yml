# Optimized AXIOM Engine CI/CD Workflow

name: AXIOM Engine CI/CD

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]
  release:
    types: [ created ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build-type: [Release, Debug]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.25.x'

    - name: Install dependencies
      run: |
        if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
          sudo apt-get update && sudo apt-get install -y build-essential g++ python3-dev libnuma-dev ninja-build || true;
        elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
          brew install ninja || brew upgrade ninja || true;
        else
          choco install ninja --no-progress || true;
        fi

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}

    - name: Build
      run: cmake --build build --config ${{ matrix.build-type }}

    - name: Run Tests
      run: |
        cd build
        # Run core AXIOM tests first for maximum visibility
        ctest -R "run_tests|giga_test_suite|differential_suite|arena_stress|simd_matrix_test" --output-on-failure --build-config ${{ matrix.build-type }}
        # Run remaining tests (Eigen, etc.) as secondary
        # ctest -E "run_tests|giga_test_suite|differential_suite|arena_stress|simd_matrix_test" --output-on-failure --build-config ${{ matrix.build-type }}

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.build-type }}
        path: build/Testing/
        if-no-files-found: ignore
