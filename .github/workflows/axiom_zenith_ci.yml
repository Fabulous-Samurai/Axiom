name: "AXIOM Zenith Modular CI"

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-verify:
    name: "Phase 0: Hygiene & Formal"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: "Run Pre-Commit"
        continue-on-error: true
        run: |
          python -m pip install pre-commit
          pre-commit run --all-files --verbose
      - name: "Run Zenith Pillar Verification"
        run: python3 scripts/verify_zenith_pillars.py
      - name: "Setup Java"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: "Download TLA2Tools"
        run: wget https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar -O tla2tools.jar
      - name: "Run TLA+ Model Checks"
        continue-on-error: true
        run: |
          cp tla2tools.jar formal/tla/
          cd formal/tla
          mkdir -p logs
          python3 run_pluto_verification.py

  build-linux:
    name: "Phase 1: Build Linux (Coverage)"
    needs: lint-and-verify
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: build-wrapper-output
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: "Install System Dependencies"
        run: |
          sudo apt-get update && sudo apt-get install -y ninja-build python3-dev libnuma-dev valgrind libvulkan-dev qt6-base-dev qt6-declarative-dev
          python -m pip install nanobind pytest numpy matplotlib
      - name: "Install build-wrapper"
        run: |
          curl -sSLo $HOME/build-wrapper-linux-x86.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -o $HOME/build-wrapper-linux-x86.zip -d $HOME/
          echo "$HOME/build-wrapper-linux-x86" >> $GITHUB_PATH
      - name: "Configure CMake (Coverage)"
        run: |
          cmake -G "Ninja" -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAXIOM_ENABLE_TELEMETRY=ON \
            -DAXIOM_ENABLE_NANOBIND=ON \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_VERBOSE_MAKEFILE=ON
      - name: "Build with build-wrapper"
        run: |
          build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} cmake --build build -j$(nproc)
      - name: "Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: axiom-linux-coverage
          path: |
            build/
            ${{ env.BUILD_WRAPPER_OUT_DIR }}
          retention-days: 1

  test-linux:
    name: "Phase 2: Test Linux & Coverage"
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: "Install LCOV & Dependencies"
        run: |
          sudo apt-get update && sudo apt-get install -y lcov
          python3 -m pip install pytest numpy matplotlib
      - name: "Download Artifacts"
        uses: actions/download-artifact@v4
        with:
          name: axiom-linux-coverage
          path: build/
      - name: "Run Tests"
        run: |
          chmod +x build/run_tests build/test_ida_star build/test_pluto_core build/giga_test_suite
          cd build && ctest --output-on-failure -j4 --timeout 600 || (find Testing -name "LastTest.log" -exec cat {} + && exit 1)
      - name: "Performance Benchmarking & Regression Check"
        continue-on-error: true # Don't block whole CI yet, just report
        run: |
          ./build/giga_test_suite --benchmark_format=json > current_perf.json
          # python3 scripts/perf/check_perf_regression.py current_perf.json .agents/perf_baseline_linux.json 0.10
      - name: "Generate LCOV Report"
        run: |
          lcov --capture --directory build --output-file coverage-raw.info --ignore-errors mismatch
          lcov --remove coverage-raw.info '/usr/*' '*/_deps/*' '*/tests/*' '*/extern/*' --output-file coverage-filtered.info --ignore-errors unused
      - name: "Upload Coverage Report"
        uses: actions/upload-artifact@v4
        with:
          name: axiom-coverage-report
          path: coverage-filtered.info
          retention-days: 1

  build-windows:
    name: "Phase 1: Build Windows"
    needs: lint-and-verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: "Install Ninja & Dependencies"
        run: |
          choco install ninja
          python -m pip install nanobind pytest numpy matplotlib
      - name: "Build"
        shell: bash
        run: |
          cmake -G "Ninja" -B build -DCMAKE_BUILD_TYPE=Debug -DAXIOM_ENABLE_TELEMETRY=ON -DAXIOM_ENABLE_NANOBIND=ON
          cmake --build build --config Debug
      - name: "Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: axiom-windows-debug
          path: build/
          retention-days: 1

  test-windows:
    name: "Phase 2: Test Windows"
    needs: build-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Download Artifacts"
        uses: actions/download-artifact@v4
        with:
          name: axiom-windows-debug
          path: build/
      - name: "Run Tests"
        shell: bash
        run: |
          cd build && ctest --output-on-failure -j4 --timeout 600

  build-macos:
    name: "Phase 1: Build MacOS"
    needs: lint-and-verify
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: "Install Dependencies"
        run: |
          brew install ninja
          python -m pip install nanobind pytest numpy matplotlib
      - name: "Build"
        run: |
          cmake -G "Ninja" -B build -DCMAKE_BUILD_TYPE=Debug -DAXIOM_ENABLE_TELEMETRY=ON -DAXIOM_ENABLE_NANOBIND=ON
          cmake --build build --config Debug
      - name: "Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: axiom-macos-debug
          path: build/
          retention-days: 1

  test-macos:
    name: "Phase 2: Test MacOS"
    needs: build-macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Download Artifacts"
        uses: actions/download-artifact@v4
        with:
          name: axiom-macos-debug
          path: build/
      - name: "Run Tests"
        run: |
          cd build && ctest --output-on-failure -j4 --timeout 600

  sonarcloud:
    name: "Phase 3: SonarCloud"
    needs: [test-linux, test-windows, test-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Download Build Artifacts"
        uses: actions/download-artifact@v4
        with:
          name: axiom-linux-coverage
          path: .
      - name: "Download Coverage Report"
        uses: actions/download-artifact@v4
        with:
          name: axiom-coverage-report
          path: .
      - name: "SonarCloud Scan"
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=axiom_engine_fabulous_samurai
            -Dsonar.organization=fabulous-samurai
            -Dsonar.cfamily.build-wrapper-output=build-wrapper-output
            -Dsonar.coverageReportPaths=coverage-filtered.info
            -Dsonar.cfamily.gcov.reportsPath=build
