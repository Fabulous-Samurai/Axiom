name: "AXIOM Zenith Modular CI"

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-verify:
    name: "Phase 0: Hygiene & Formal"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - name: "Set up Python"
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
        with:
          python-version: '3.12'
      - name: "Run Pre-Commit"
        run: |
          python -m pip install pre-commit
          pre-commit run --all-files --verbose
      - name: "Run Zenith Pillar Verification"
        run: python3 scripts/verify_zenith_pillars.py
      - name: "Setup Java"
        uses: actions/setup-java@v4.2.2
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: "Download TLA2Tools"
        run: wget https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar -O tla2tools.jar
      - name: "Run TLA+ Model Checks"
        run: |
          cp tla2tools.jar formal/tla/
          cd formal/tla
          mkdir -p logs
          python3 run_pluto_verification.py

  build-linux:
    name: "Phase 1: Build Linux (Coverage)"
    needs: lint-and-verify
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: build-wrapper-output
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0
      - name: "Install System Dependencies"
        run: |
          sudo apt-get update && sudo apt-get install -y ninja-build python3-dev libnuma-dev valgrind ccache
          python -m pip install nanobind pytest numpy matplotlib
      - name: "Ccache Cache"
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: ${{ runner.os }}-ccache-
      - name: "Install build-wrapper"
        run: |
          curl -sSLo $HOME/build-wrapper-linux-x86.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -o $HOME/build-wrapper-linux-x86.zip -d $HOME/
          echo "$HOME/build-wrapper-linux-x86" >> $GITHUB_PATH
      - name: "Configure CMake (Coverage)"
        run: |
          cmake -G "Ninja" -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAXIOM_ENABLE_TELEMETRY=ON \
            -DAXIOM_ENABLE_NANOBIND=ON \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: "Build with build-wrapper"
        run: |
          build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} cmake --build build -j$(nproc)
      - name: "Upload Artifacts"
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
        with:
          name: axiom-linux-coverage
          path: |
            build/axiom
            build/run_tests
            build/giga_test_suite
            ${{ env.BUILD_WRAPPER_OUT_DIR }}
          retention-days: 1

  test-linux:
    name: "Phase 2: Test Linux & Coverage"
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - name: "Install LCOV & Dependencies"
        run: |
          sudo apt-get update && sudo apt-get install -y lcov
          python3 -m pip install pytest numpy matplotlib
      - name: "Download Artifacts"
        uses: actions/download-artifact@6b208ae046db98c579e8a3aa621ab581ff575935 # v4.1.7
        with:
          name: axiom-linux-coverage
          path: build/
      - name: "Run Tests"
        run: |
          chmod +x build/axiom build/run_tests build/giga_test_suite
          cd build && ./run_tests --gtest_output=xml:test_results.xml
      - name: "Performance Gate"
        run: |
          ./build/giga_test_suite --benchmark_format=json > current_perf.json
          python3 scripts/perf/check_perf_regression.py current_perf.json .agents/perf_baseline_linux.json 0.05
      - name: "Generate LCOV Report"
        run: |
          lcov --capture --directory build --output-file coverage-raw.info --ignore-errors mismatch
          lcov --remove coverage-raw.info '/usr/*' '*/_deps/*' '*/tests/*' '*/extern/*' --output-file coverage-filtered.info --ignore-errors unused
      - name: "Upload Coverage Report"
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
        with:
          name: axiom-coverage-report
          path: coverage-filtered.info
          retention-days: 1

  build-windows:
    name: "Phase 1: Build Windows"
    needs: lint-and-verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - name: "Install Ninja & Dependencies"
        run: |
          choco install ninja ccache
          python -m pip install nanobind pytest numpy matplotlib
      - name: "Build"
        shell: bash
        run: |
          cmake -G "Ninja" -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --config Release
      - name: "Upload Artifacts"
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
        with:
          name: axiom-windows-binaries
          path: |
            build/*.exe
            build/*.dll
          retention-days: 1

  test-windows:
    name: "Phase 2: Test Windows"
    needs: build-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - name: "Download Artifacts"
        uses: actions/download-artifact@6b208ae046db98c579e8a3aa621ab581ff575935 # v4.1.7
        with:
          name: axiom-windows-binaries
          path: build/
      - name: "Run Tests"
        shell: bash
        run: |
          cd build && ./run_tests.exe

  sonarcloud:
    name: "Phase 3: SonarCloud"
    needs: [test-linux, test-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0
      - name: "Download Coverage Report"
        uses: actions/download-artifact@6b208ae046db98c579e8a3aa621ab581ff575935 # v4.1.7
        with:
          name: axiom-coverage-report
          path: .
      - name: "SonarCloud Scan"
        uses: SonarSource/sonarqube-scan-action@53c6b9f13962ae22901f056d6d4ba877f91f27ed # v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=axiom_engine_fabulous_samurai
            -Dsonar.organization=fabulous-samurai
            -Dsonar.coverageReportPaths=coverage-filtered.info
