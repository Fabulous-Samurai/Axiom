name: "AXIOM Zenith Modular CI"

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-verify:
    name: "Phase 0: Hygiene & Formal"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: "Run Pre-Commit"
        continue-on-error: true
        run: |
          python -m pip install pre-commit
          pre-commit run --all-files --verbose
      - name: "Setup Java"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: "Download TLA2Tools"
        run: wget https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar -O tla2tools.jar
      - name: "Run TLA+ Model Checks"
        continue-on-error: true
        run: |
          cp tla2tools.jar formal/tla/
          cd formal/tla
          mkdir -p logs
          python3 run_pluto_verification.py

  build-linux:
    name: "Phase 1: Build Linux (Debug)"
    needs: lint-and-verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: "Install System Dependencies"
        run: sudo apt-get update && sudo apt-get install -y ninja-build valgrind python3-dev
      - name: "Direct CMake Build"
        run: |
          mkdir -p build && cd build
          cmake -G "Ninja" .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAXIOM_ENABLE_TELEMETRY=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_VERBOSE_MAKEFILE=ON
          ninja -v
      - name: "List Build Directory"
        run: ls -R build
      - name: "Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: axiom-linux-debug
          path: build/
          retention-days: 1

  test-linux:
    name: "Phase 2: Test Linux"
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: "Download Artifacts"
        uses: actions/download-artifact@v4
        with:
          name: axiom-linux-debug
          path: build/
      - name: "Run Tests"
        run: |
          chmod +x build/run_tests build/test_ida_star build/test_pluto_core
          cd build && ctest --output-on-failure -j4 --timeout 300 || (find Testing -name "LastTest.log" -exec cat {} + && exit 1)

  build-windows:
    name: "Phase 1: Build Windows (Debug)"
    needs: lint-and-verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: "Install Ninja"
        run: choco install ninja
      - name: "Build"
        shell: bash
        run: |
          cmake -G "Ninja" -B build -DCMAKE_BUILD_TYPE=Debug -DAXIOM_ENABLE_TELEMETRY=ON -DCMAKE_VERBOSE_MAKEFILE=ON
          cmake --build build --config Debug --verbose
      - name: "List Build Directory"
        shell: bash
        run: ls -R build
      - name: "Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: axiom-windows-debug
          path: build/
          retention-days: 1

  test-windows:
    name: "Phase 2: Test Windows"
    needs: build-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: "Download Artifacts"
        uses: actions/download-artifact@v4
        with:
          name: axiom-windows-debug
          path: build/
      - name: "Run Tests"
        shell: bash
        run: |
          export PATH="$PATH:$(pwd)/build"
          cd build && ctest --output-on-failure -j4 --timeout 300 || (find Testing -name "LastTest.log" -exec cat {} + && exit 1)

  sonarcloud:
    name: "Phase 3: SonarCloud"
    needs: [test-linux, test-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "SonarCloud Scan"
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
