repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.3
    hooks:
      - id: clang-format
        args: [--style=Google]

  - repo: local
    hooks:
      - id: axiom-pillar-check
        name: AXIOM Zenith Pillar Check
        entry: python scripts/verify_zenith_pillars.py
        language: python
        files: \.(cpp|h|hpp)$
        description: "Verify Zero-Allocation and RDTSC Determinism rules."
