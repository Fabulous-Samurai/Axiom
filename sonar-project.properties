# AXIOM — SonarCloud Configuration
sonar.projectKey=axiom_engine_fabulous_samurai
sonar.projectName=AXIOM
sonar.organization=fabulous-samurai

sonar.sources=src,include
sonar.tests=tests
sonar.language=cpp
sonar.cpp.std=c++23
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=build/**,_deps/**,extern/**,vcpkg/**,**/vcpkg_installed/**
sonar.test.exclusions=**/bench_*.cpp

# Coverage & Analysis
sonar.cfamily.build-wrapper-output=build-wrapper-output
sonar.coverageReportPaths=coverage-filtered.info
sonar.cfamily.gcov.reportsPath=build-coverage
sonar.cfamily.threads=2
